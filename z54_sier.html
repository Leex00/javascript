<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Sieradzki Z54_JS</title>   
</head>
<body>

<div style="font-size:20px;">
<script>

var a_sie = 6; 
var b_sie = 20; 

for (var i_sie = 1; i_sie <= b_sie; i_sie++) {
    document.write("*");
}
document.write("<br>");

for (var i_sie = 1; i_sie <= a_sie - 2; i_sie++) {
    document.write("*");

    for (var j_sie = 1; j_sie <= b_sie - 2; j_sie++) {
        document.write("&nbsp;&nbsp;");
    }

    document.write("*<br>");
}

for (var i_sie = 1; i_sie <= b_sie; i_sie++) {
    document.write("*");
}

</script>
</div>

</body>
</html>

<body> 
<div style="color:red;font-size:50px;"> 
<script> 
var koniec_petli_sie = prompt("Podaj koniec pętli:", "");
koniec_petli_sie = parseInt(koniec_petli_sie);

for (var i_sie = 2; i_sie <= koniec_petli_sie; i_sie += 2)
{
    document.write("Liczba " + i_sie + "<br>");
}
</script> 
</div>

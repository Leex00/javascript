        <title>Sieradzki Z50_JS</title>   
    </head>
    <body>
        <div style="color:red;font-size:50px;">
            <script language="JavaScript">
                suma_sie=0;
                for(i_s=1;i_s<=1000000;i_s++)
            {
                suma_sie=suma_sie+1/i_s;
            }
            document.write("suma = "+ suma_sie.toFixed(2)+"<br>");
            </script>
        </div>
    </body>

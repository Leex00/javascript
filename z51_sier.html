<title>Sieradzki Z51_JS</title>   
</head>
<body>
<div style="color:red;font-size:50px;">
<script>
var n_sie = parseInt(prompt("Z czego silnia:", ""));
var silnia_sie = 1;

if (n_sie == 0) {
    silnia_sie = 1;
} else {
    for (var i_sie = 1; i_sie <= n_sie; i_sie++) {
        silnia_sie = silnia_sie * i_sie;
    }
}

document.write("n=" + n_sie + "<br>");
document.write(n_sie + "!=" + silnia_sie);
</script>
</div>
</body>
</html>
